SPECIFICATION Spec

CONSTANTS
  Actors = {a1, a2}
  UpdateIDs = {u1, u2}
  Kinds = {initial, coagent}
  Contents = {runA, runB}
  ObjectKinds = {"run", "agent"}
  MaxObjects = 4

INVARIANTS
  TypeOK
  DurableLogCompleteness
  ProcessedImpliesSent
  NoDuplicateDelivery
  ObjectGraphDurable
  ObjectGraphUniqueIDs
  MemorySnapshotConsistency

(* Liveness: EverySentUpdateProcessed is currently too strong under unbounded
   evict/Sweep loops. It will be restored once a fairness model that guarantees
   progress despite crash/re-activation is designed. *)
