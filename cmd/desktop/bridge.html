<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir — Passkey</title>
<style>
  :root {
    --choir-bg: #050912;
    --choir-panel: #0D1628;
    --choir-panel-strong: #09101F;
    --choir-fg: #F7FAFF;
    --choir-muted: #9AA9C0;
    --choir-subtle: #65748D;
    --choir-accent: #6D8DFF;
    --choir-accent2: #45D7FF;
    --choir-border: rgba(133, 159, 211, 0.22);
    --choir-input-bg: rgba(10, 17, 31, 0.78);
    --choir-selected: rgba(91, 123, 255, 0.22);
    --choir-success: #20D686;
    --choir-danger: #FF5B6B;
    --choir-radius-control: 20px;
    --choir-radius-panel: 26px;
    --choir-shadow-soft: 0 18px 54px rgba(0,0,0,.38);
    --choir-shadow-glow: 0 0 42px rgba(89, 125, 255, .22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--choir-bg);
    color: var(--choir-fg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--choir-panel);
    border: 1px solid var(--choir-border);
    border-radius: var(--choir-radius-panel);
    padding: 44px 36px;
    max-width: 400px; width: 90%; text-align: center;
    box-shadow: var(--choir-shadow-soft), var(--choir-shadow-glow);
  }
  .logo {
    width: 48px; height: 48px;
    margin: 0 auto 20px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--choir-accent), var(--choir-accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(109, 141, 255, 0.3);
  }
  .logo svg { width: 26px; height: 26px; }
  h1 {
    font-size: 1.35rem; font-weight: 600;
    margin-bottom: 6px; letter-spacing: -0.01em;
  }
  p {
    color: var(--choir-muted);
    margin-bottom: 28px; font-size: 0.9rem; line-height: 1.5;
  }
  input {
    width: 100%; padding: 13px 18px;
    border-radius: var(--choir-radius-control);
    border: 1px solid var(--choir-border);
    background: var(--choir-input-bg);
    color: var(--choir-fg);
    font-size: 0.95rem; margin-bottom: 14px; outline: none;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  input::placeholder { color: var(--choir-subtle); }
  input:focus {
    border-color: var(--choir-accent);
    box-shadow: 0 0 0 3px rgba(109, 141, 255, 0.15);
  }
  button {
    width: 100%; padding: 13px;
    border-radius: var(--choir-radius-control);
    border: none; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; margin-bottom: 10px;
    transition: all 120ms ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--choir-accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(109, 141, 255, 0.25);
  }
  .btn-primary:hover {
    background: #7d9dff;
    box-shadow: 0 6px 20px rgba(109, 141, 255, 0.35);
  }
  .btn-secondary {
    background: transparent;
    color: var(--choir-fg);
    border: 1px solid var(--choir-border);
  }
  .btn-secondary:hover {
    background: var(--choir-selected);
    border-color: var(--choir-accent);
  }
  .status {
    margin-top: 18px; padding: 14px 16px;
    border-radius: var(--choir-radius-control);
    font-size: 0.88rem; line-height: 1.4;
    text-align: left;
  }
  .status.success {
    background: rgba(32, 214, 134, 0.1);
    color: var(--choir-success);
    border: 1px solid rgba(32, 214, 134, 0.2);
  }
  .status.error {
    background: rgba(255, 91, 107, 0.1);
    color: var(--choir-danger);
    border: 1px solid rgba(255, 91, 107, 0.2);
  }
  .status.info {
    background: var(--choir-selected);
    color: var(--choir-accent2);
    border: 1px solid var(--choir-border);
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <h1>Choir</h1>
  <p id="subtitle">Authenticate with Touch ID to continue</p>

  <div id="auth-form">
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <button class="btn-primary" id="register-btn">Create Passkey</button>
    <button class="btn-secondary" id="login-btn">Sign In with Passkey</button>
  </div>

  <div id="status" class="status hidden"></div>
</div>

<script>
function base64urlToBuffer(b64url) {
  let b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function bufferToBase64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.classList.remove('hidden');
}

function hideStatus() {
  document.getElementById('status').classList.add('hidden');
}

async function registerPasskey(email) {
  showStatus('Starting passkey creation...', 'info');

  const beginRes = await fetch('/auth/register/begin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email }),
  });
  if (!beginRes.ok) {
    const err = await beginRes.json().catch(() => ({}));
    throw new Error(err.error || 'Registration begin failed');
  }

  const creationOptions = await beginRes.json();
  const publicKey = creationOptions.publicKey || creationOptions;

  showStatus('Waiting for Touch ID / security key...', 'info');

  const credential = await navigator.credentials.create({
    publicKey: {
      rp: publicKey.rp,
      user: {
        id: base64urlToBuffer(publicKey.user.id),
        name: publicKey.user.name,
        displayName: publicKey.user.displayName,
      },
      challenge: base64urlToBuffer(publicKey.challenge),
      pubKeyCredParams: (publicKey.pubKeyCredParams || []).map(p => ({ type: p.type, alg: p.alg })),
      timeout: publicKey.timeout,
      excludeCredentials: (publicKey.excludeCredentials || []).map(c => ({
        id: base64urlToBuffer(c.id), type: c.type, transports: c.transports,
      })),
      authenticatorSelection: publicKey.authenticatorSelection,
      attestation: publicKey.attestation,
    },
  });

  showStatus('Completing registration...', 'info');

  const finishBody = {
    id: credential.id,
    rawId: bufferToBase64url(credential.rawId),
    type: credential.type,
    response: {
      clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
      attestationObject: bufferToBase64url(credential.response.attestationObject),
    },
  };

  const finishRes = await fetch('/auth/register/finish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify(finishBody),
  });
  if (!finishRes.ok) {
    const err = await finishRes.json().catch(() => ({}));
    throw new Error(err.error || 'Registration finish failed');
  }

  return finishRes.json();
}

async function loginPasskey(email) {
  showStatus('Starting passkey login...', 'info');

  const beginRes = await fetch('/auth/login/begin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email }),
  });
  if (!beginRes.ok) {
    const err = await beginRes.json().catch(() => ({}));
    throw new Error(err.error || 'Login begin failed');
  }

  const assertionOptions = await beginRes.json();
  const publicKey = assertionOptions.publicKey || assertionOptions;

  showStatus('Waiting for Touch ID / security key...', 'info');

  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge: base64urlToBuffer(publicKey.challenge),
      rpId: publicKey.rpId,
      allowCredentials: (publicKey.allowCredentials || []).map(c => ({
        id: base64urlToBuffer(c.id), type: c.type, transports: c.transports,
      })),
      timeout: publicKey.timeout,
      userVerification: publicKey.userVerification,
    },
  });

  showStatus('Completing login...', 'info');

  const finishBody = {
    id: assertion.id,
    rawId: bufferToBase64url(assertion.rawId),
    type: assertion.type,
    response: {
      clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
      authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
      signature: bufferToBase64url(assertion.response.signature),
      ...(assertion.response.userHandle ? {
        userHandle: bufferToBase64url(assertion.response.userHandle),
      } : {}),
    },
  };

  const finishRes = await fetch('/auth/login/finish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify(finishBody),
  });
  if (!finishRes.ok) {
    const err = await finishRes.json().catch(() => ({}));
    throw new Error(err.error || 'Login finish failed');
  }

  return finishRes.json();
}

async function completeAuth() {
  try {
    await fetch('/desktop-auth/complete', {
      method: 'POST',
      credentials: 'include',
    });
  } catch (_e) { /* ignore */ }
}

async function handleRegister() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showStatus('Please enter your email', 'error'); return; }
  hideStatus();
  try {
    await registerPasskey(email);
    showStatus('Passkey created! Returning to Choir...', 'success');
    document.getElementById('auth-form').classList.add('hidden');
    await completeAuth();
    window.location.href = 'choir-desktop://auth-complete';
  } catch (err) {
    showStatus(err.message || 'Registration failed', 'error');
  }
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showStatus('Please enter your email', 'error'); return; }
  hideStatus();
  try {
    await loginPasskey(email);
    showStatus('Signed in! Returning to Choir...', 'success');
    document.getElementById('auth-form').classList.add('hidden');
    await completeAuth();
    window.location.href = 'choir-desktop://auth-complete';
  } catch (err) {
    showStatus(err.message || 'Login failed', 'error');
  }
}

// Pre-fill email from query param.
const params = new URLSearchParams(window.location.search);
const emailParam = params.get('email');
if (emailParam) {
  document.getElementById('email').value = emailParam;
}

document.getElementById('register-btn').addEventListener('click', handleRegister);
document.getElementById('login-btn').addEventListener('click', handleLogin);
</script>
</body>
</html>
