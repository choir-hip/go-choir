name: CI

on:
  workflow_dispatch:
    inputs:
      force_staging_deploy:
        description: Force a host/frontend staging deploy from main
        type: boolean
        required: false
        default: true
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    name: Plan CI Lanes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      non_docs: ${{ steps.classify.outputs.non_docs }}
      go: ${{ steps.classify.outputs.go }}
      frontend: ${{ steps.classify.outputs.frontend }}
      specs: ${{ steps.classify.outputs.specs }}
      sbom: ${{ steps.classify.outputs.sbom }}
      flakehub: ${{ steps.classify.outputs.flakehub }}
      high_risk_race: ${{ steps.classify.outputs.high_risk_race }}
      ci: ${{ steps.classify.outputs.ci }}
      sampled_race: ${{ steps.classify.outputs.sampled_race }}
      sample_bucket: ${{ steps.classify.outputs.sample_bucket }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Classify changed paths and deterministic race sample
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          force_all=false
          case "$EVENT_NAME" in
            workflow_dispatch)
              force_all=true
              before=""
              ;;
            pull_request)
              before="$PR_BASE"
              ;;
            push)
              before="$PUSH_BEFORE"
              ;;
            *)
              force_all=true
              before=""
              ;;
          esac

          if [[ "$force_all" != "true" && -n "$before" && ! "$before" =~ ^0+$ ]]; then
            git cat-file -e "${before}^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$before"
          else
            force_all=true
          fi

          if [[ "$force_all" == "true" ]]; then
            printf '' | CI_FORCE_ALL=true .github/scripts/ci-impact-classify --sha "$AFTER" "$GITHUB_OUTPUT"
          else
            git diff --name-only "$before" "$AFTER" |
              .github/scripts/ci-impact-classify --sha "$AFTER" "$GITHUB_OUTPUT"
          fi

      - name: Test CI classifiers and differential SBOM reuse
        if: steps.classify.outputs.ci == 'true'
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/ci-impact-classify-test
          .github/scripts/build-sboms-differential-test
          .github/scripts/deploy-impact-classify-test
          bash -n .github/scripts/*

  go-vet-build:
    name: Go Vet + Build
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/...

  tla-model-check:
    name: TLA+ Model Check (specs/)
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.specs == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download TLA+ tools
        run: curl -fsSL -o /tmp/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar

      - name: Model check all specs
        working-directory: specs
        run: |
          set -euo pipefail
          for spec in *.tla; do
            echo "=== ${spec} ==="
            java -XX:+UseParallelGC -cp /tmp/tla2tools.jar tlc2.TLC -deadlock -workers auto "${spec}"
          done

  go-test:
    name: Go Test (non-runtime shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test non-runtime shard
        shell: bash
        env:
          TOTAL_SHARDS: 3
          SHARD_INDEX: ${{ matrix.shard }}
        run: scripts/go-test-non-runtime-shards

  go-test-runtime:
    name: Go Test (internal/runtime shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test internal/runtime shard
        shell: bash
        env:
          TOTAL_SHARDS: 4
          SHARD_INDEX: ${{ matrix.shard }}
        run: scripts/go-test-runtime-shards

      - name: Go test integration-tagged smoke
        if: matrix.shard == 1
        shell: bash
        run: scripts/go-test-integration

  race:
    needs: plan
    if: needs.plan.outputs.high_risk_race == 'true' || (github.event_name == 'push' && needs.plan.outputs.go == 'true' && needs.plan.outputs.sampled_race == 'true')
    uses: ./.github/workflows/race.yml

  doccheck:
    name: Docs Truth Check
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run doccheck
        shell: bash
        run: scripts/doccheck

      - name: Confirm reports were produced
        shell: bash
        run: test -s doccheck-report.md && test -s doccheck.json

      - name: Upload doccheck reports
        uses: actions/upload-artifact@v7
        with:
          name: doccheck-report
          path: |
            doccheck-report.md
            doccheck.json

  heresy-detector:
    name: Heresy Detector Discovery
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run heresy detector in discovery mode
        shell: bash
        run: scripts/check-heresies.sh --report heresy-detector-report.json

      - name: Upload heresy detector report
        uses: actions/upload-artifact@v7
        with:
          name: heresy-detector-report
          path: heresy-detector-report.json
          if-no-files-found: warn

  check:
    name: Go Vet + Test + Build
    runs-on: ubuntu-latest
    needs: [plan, go-vet-build, tla-model-check, go-test, go-test-runtime, race, doccheck, heresy-detector, build-frontend]
    if: always()
    steps:
      - name: Confirm selected CI gates passed
        shell: bash
        run: |
          set -euo pipefail
          require_success() {
            local selected="$1"
            local name="$2"
            local result="$3"
            if [[ "$selected" == "true" && "$result" != "success" ]]; then
              echo "$name was selected but result was $result" >&2
              exit 1
            fi
          }
          require_if_run() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "skipped" && "$result" != "success" ]]; then
              echo "$name ran but result was $result" >&2
              exit 1
            fi
          }

          [[ "${{ needs.plan.result }}" == "success" ]] || {
            echo "plan result: ${{ needs.plan.result }}" >&2
            exit 1
          }
          [[ "${{ needs.doccheck.result }}" == "success" ]] || {
            echo "doccheck result: ${{ needs.doccheck.result }}" >&2
            exit 1
          }

          require_success "${{ needs.plan.outputs.go }}" go-vet-build "${{ needs.go-vet-build.result }}"
          require_success "${{ needs.plan.outputs.go }}" go-test "${{ needs.go-test.result }}"
          require_success "${{ needs.plan.outputs.go }}" go-test-runtime "${{ needs.go-test-runtime.result }}"
          require_success "${{ needs.plan.outputs.specs }}" tla-model-check "${{ needs.tla-model-check.result }}"
          require_success "${{ needs.plan.outputs.non_docs }}" heresy-detector "${{ needs.heresy-detector.result }}"
          race_selected=false
          if [[ "${{ needs.plan.outputs.high_risk_race }}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "push" && "${{ needs.plan.outputs.go }}" == "true" && "${{ needs.plan.outputs.sampled_race }}" == "true" ]]; then
            race_selected=true
          fi
          require_success "$race_selected" race "${{ needs.race.result }}"
          require_if_run build-frontend "${{ needs.build-frontend.result }}"
          echo "All selected CI gates passed"

  sbom:
    name: Generate Differential SBOMs
    runs-on: ubuntu-latest
    needs: [plan, check]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.outputs.sbom == 'true' && needs.check.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v20
        with:
          determinate: false

      - name: Restore previous complete SBOM bundle
        id: restore-sbom-baseline
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/sbom-baseline
          key: sbom-bundle-v2-${{ github.sha }}
          restore-keys: |
            sbom-bundle-v2-

      - name: Build changed packages and reuse identical SBOMs
        shell: bash
        run: .github/scripts/build-sboms-differential sboms "$RUNNER_TEMP/sbom-baseline" "$GITHUB_SHA"

      - name: Save complete SBOM bundle as next baseline
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP/sbom-baseline"
          mkdir -p "$RUNNER_TEMP/sbom-baseline"
          cp -a sboms/. "$RUNNER_TEMP/sbom-baseline/"

      - name: Cache complete SBOM baseline
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/sbom-baseline
          key: sbom-bundle-v2-${{ github.sha }}

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sboms-${{ github.sha }}
          path: |
            sboms/*/sbom.json
            sboms/manifest.jsonl
            sboms/diff.json
          if-no-files-found: error
          retention-days: 90

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [plan, deploy-impact]
    if: always() && ((github.event_name == 'pull_request' && needs.plan.outputs.frontend == 'true') || needs.deploy-impact.outputs.deploy_frontend == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

  deploy-impact:
    name: Detect Staging Deploy Impact
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.plan.outputs.non_docs == 'true'
    outputs:
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      deploy_host: ${{ steps.detect.outputs.deploy_host }}
      deploy_frontend: ${{ steps.detect.outputs.deploy_frontend }}
      deploy_host_service: ${{ steps.detect.outputs.deploy_host_service }}
      deploy_ordinary_guest: ${{ steps.detect.outputs.deploy_ordinary_guest }}
      deploy_playwright_guest: ${{ steps.detect.outputs.deploy_playwright_guest }}
      deploy_host_os: ${{ steps.detect.outputs.deploy_host_os }}
      deploy_vmctl_restart: ${{ steps.detect.outputs.deploy_vmctl_restart }}
      deploy_active_vm_refresh: ${{ steps.detect.outputs.deploy_active_vm_refresh }}
      host_services: ${{ steps.detect.outputs.host_services }}
      class_explanation: ${{ steps.detect.outputs.class_explanation }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Test deploy impact classifier
        shell: bash
        run: .github/scripts/deploy-impact-classify-test

      - name: Detect deployed artifact changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_staging_deploy }}" == "true" ]]; then
            {
              echo "deploy_needed=true"
              echo "deploy_host=true"
              echo "deploy_frontend=true"
              echo "deploy_host_service=false"
              echo "deploy_ordinary_guest=false"
              echo "deploy_playwright_guest=false"
              echo "deploy_host_os=true"
              echo "deploy_vmctl_restart=true"
              echo "deploy_active_vm_refresh=true"
              echo "host_services="
              echo "class_explanation=manual workflow_dispatch forced host/frontend staging deploy with active VM refresh"
            } >> "$GITHUB_OUTPUT"
            echo "Staging deploy forced by manual workflow_dispatch."
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -n "$before" && ! "$before" =~ ^0+$ ]]; then
            git fetch --no-tags --depth=1 origin "$before" || true
          fi

          if [[ -z "$before" || "$before" =~ ^0+$ ]] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$after")
          else
            mapfile -t changed < <(git diff --name-only "$before" "$after")
          fi

          printf '%s\n' "${changed[@]}" | .github/scripts/deploy-impact-classify "$GITHUB_OUTPUT"

          deploy_needed="$(grep '^deploy_needed=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"

          if [[ "$deploy_needed" == "true" ]]; then
            echo "Staging deploy required: at least one deployed artifact path changed."
          else
            echo "Skipping staging deploy: only docs, workflow, or Playwright test artifacts changed."
          fi

  flakehub-publish:
    name: Publish Rolling Flake
    runs-on: ubuntu-latest
    needs: [plan, check]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.outputs.flakehub == 'true' && needs.check.result == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-push@main
        with:
          name: choir-hip/go-choir
          rolling: true
          visibility: public
          include-output-paths: true

  deploy-staging:
    name: Deploy to Staging (Node B)
    runs-on: ubuntu-latest
    needs: [check, build-frontend, deploy-impact]
    if: always() && github.ref == 'refs/heads/main' && needs.deploy-impact.outputs.deploy_needed == 'true' && needs.check.result == 'success' && (needs.deploy-impact.outputs.deploy_frontend != 'true' || needs.build-frontend.result == 'success')
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host go-choir-node-b
            HostName ${{ secrets.OVH_NODE_B_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 6
          EOF

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ needs.deploy-impact.outputs.deploy_host }}
          DEPLOY_FRONTEND: ${{ needs.deploy-impact.outputs.deploy_frontend }}
          DEPLOY_VMCTL_RESTART: ${{ needs.deploy-impact.outputs.deploy_vmctl_restart }}
          DEPLOY_ACTIVE_VM_REFRESH: ${{ needs.deploy-impact.outputs.deploy_active_vm_refresh }}
          DEPLOY_ORDINARY_GUEST: ${{ needs.deploy-impact.outputs.deploy_ordinary_guest }}
          DEPLOY_PLAYWRIGHT_GUEST: ${{ needs.deploy-impact.outputs.deploy_playwright_guest }}
          DEPLOY_HOST_OS: ${{ needs.deploy-impact.outputs.deploy_host_os }}
          HOST_SERVICES: ${{ needs.deploy-impact.outputs.host_services }}
        run: |
          remote_env=(
            "DEPLOY_HOST=$DEPLOY_HOST"
            "DEPLOY_FRONTEND=$DEPLOY_FRONTEND"
            "DEPLOY_VMCTL_RESTART=$DEPLOY_VMCTL_RESTART"
            "DEPLOY_ACTIVE_VM_REFRESH=$DEPLOY_ACTIVE_VM_REFRESH"
            "DEPLOY_ORDINARY_GUEST=$DEPLOY_ORDINARY_GUEST"
            "DEPLOY_PLAYWRIGHT_GUEST=$DEPLOY_PLAYWRIGHT_GUEST"
            "DEPLOY_HOST_OS=$DEPLOY_HOST_OS"
            "HOST_SERVICES=$HOST_SERVICES"
          )
          printf -v remote_env_q '%q ' "${remote_env[@]}"
          ssh go-choir-node-b \
            "${remote_env_q}bash -s" <<'REMOTE_DEPLOY'
            set -euo pipefail
            export PATH="/run/current-system/sw/bin:/run/wrappers/bin:$PATH"
            export PKG_CONFIG_PATH="/run/current-system/sw/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            deploy_started_at=$(date +%s)
            phase_started_at=$deploy_started_at
            echo "==> Deploy impact classes"
            echo "    deploy_host=${DEPLOY_HOST}"
            echo "    deploy_frontend=${DEPLOY_FRONTEND}"
            echo "    deploy_vmctl_restart=${DEPLOY_VMCTL_RESTART}"
            echo "    deploy_active_vm_refresh=${DEPLOY_ACTIVE_VM_REFRESH}"
            echo "    deploy_ordinary_guest=${DEPLOY_ORDINARY_GUEST}"
            echo "    deploy_playwright_guest=${DEPLOY_PLAYWRIGHT_GUEST}"
            echo "    deploy_host_os=${DEPLOY_HOST_OS}"
            echo "    host_services=${HOST_SERVICES}"
            service_pointer_deploy=false
            if [ "${DEPLOY_HOST_OS}" != "true" ] && [ -n "${HOST_SERVICES}" ]; then
              service_pointer_deploy=true
            fi
            note_phase() {
              local phase="$1"
              local now
              now=$(date +%s)
              echo "    Phase ${phase}: $((now - phase_started_at))s (total $((now - deploy_started_at))s)"
              phase_started_at=$now
            }
            dump_deploy_service_diagnostics() {
              local reason="$1"
              echo "==> Deploy service diagnostics: ${reason}" >&2
              for service in go-choir-vmctl go-choir-proxy; do
                echo "-- systemctl status ${service}" >&2
                systemctl --no-pager --full status "$service" >&2 || true
                echo "-- journalctl -u ${service} -n 80" >&2
                journalctl -u "$service" -n 80 --no-pager >&2 || true
              done
              echo "-- local health probes" >&2
              for port in 8081 8082 8083 8084 8086 8087; do
                echo "port ${port}" >&2
                curl -fsS --max-time 5 "http://127.0.0.1:${port}/health" >&2 || true
              done
              echo "-- vmctl ownership snapshot" >&2
              ownerships_snapshot=$(curl -fsS --max-time 5 -H "X-Internal-Caller: true" http://127.0.0.1:8083/internal/vmctl/list 2>/dev/null || true)
              if [ -n "$ownerships_snapshot" ]; then
                printf '%s\n' "$ownerships_snapshot" | jq . >&2 || printf '%s\n' "$ownerships_snapshot" >&2
                mapfile -t diagnostic_sandbox_urls < <(printf '%s' "$ownerships_snapshot" | jq -r '
                  .ownerships[]
                  | select(.state == "active")
                  | select((.kind == null) or (.kind == "") or (.kind == "interactive"))
                  | [.vm_id, .sandbox_url]
                  | @tsv
                ' 2>/dev/null || true)
                for record in "${diagnostic_sandbox_urls[@]}"; do
                  IFS=$'\t' read -r diagnostic_vm_id diagnostic_sandbox_url <<< "$record"
                  if [ -z "$diagnostic_sandbox_url" ]; then
                    continue
                  fi
                  echo "-- active sandbox health ${diagnostic_vm_id} ${diagnostic_sandbox_url}" >&2
                  curl -sS --max-time 5 -w '\nhttp_status=%{http_code} total_time=%{time_total}\n' "${diagnostic_sandbox_url}/health" >&2 || true
                done
              fi
            }

            if [ ! -d /opt/go-choir/.git ]; then
              echo "==> Cloning go-choir repository"
              git clone https://github.com/choir-hip/go-choir.git /opt/go-choir
            fi

            # CI SSH deploy runs as root; /opt/go-choir may be owned by another uid from prior deploys.
            git config --global --add safe.directory /opt/go-choir

            cd /opt/go-choir
            git remote set-url origin https://github.com/choir-hip/go-choir.git
            echo "==> Pulling latest code"
            git fetch origin
            git reset --hard origin/main
            git clean -ffdx
            if [ -n "$(git status --short)" ]; then
              echo "Remote checkout is dirty after reset/clean:" >&2
              git status --short >&2
              exit 1
            fi
            current_commit=$(git rev-parse HEAD)
            deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            install -d -m 0750 /var/lib/go-choir
            printf "CHOIR_DEPLOYED_AT=%s\nCHOIR_DEPLOYED_COMMIT=%s\n" "$deployed_at" "$current_commit" > /var/lib/go-choir/deploy.env.tmp
            # Preserve operator-added keys (e.g. CHOIR_BOOTSTRAP_ADMIN_API_KEY)
            # that were appended to deploy.env by the operator. Merge them in.
            if [ -f /var/lib/go-choir/deploy.env ]; then
              grep -v -E '^CHOIR_DEPLOYED_(AT|COMMIT)=' /var/lib/go-choir/deploy.env >> /var/lib/go-choir/deploy.env.tmp || true
            fi
            mv /var/lib/go-choir/deploy.env.tmp /var/lib/go-choir/deploy.env
            chmod 0644 /var/lib/go-choir/deploy.env
            note_phase "checkout"

            scripts/node-b-deploy-disk-preflight
            note_phase "disk preflight"

            systemctl reset-failed nixos-rebuild-switch-to-configuration.service 2>/dev/null || true

            echo "==> Building selected NixOS closure and guest images"
            build_selected_root() {
              local label="$1"
              local attr="$2"
              local out="$3"
              local log
              log=$(mktemp)
              local started
              started=$(date +%s)
              echo "    Building ${label}: ${attr}"
              local status=0
              /run/current-system/sw/bin/nix build "$attr" -o "$out" >"$log" 2>&1 || status=$?
              echo "==> ${label} build log"
              cat "$log"
              rm -f "$log"
              local ended
              ended=$(date +%s)
              if [ "$status" -ne 0 ]; then
                echo "Nix build failed for ${label} with status ${status}" >&2
                exit "$status"
              fi
              echo "    ${label} build complete in $((ended - started))s"
            }

            fast_build_host_service() {
              local service="$1"
              case "$service" in
                auth|gateway|maild|corpusd|proxy|sandbox|sourcecycled|vmctl)
                  ;;
                *)
                  echo "    Fast host service build unsupported for ${service}; using Nix package build"
                  return 1
                  ;;
              esac

              if ! command -v go >/dev/null 2>&1 || ! command -v pkg-config >/dev/null 2>&1 || ! command -v gcc >/dev/null 2>&1; then
                echo "    Fast host service build prerequisites missing; using Nix package build"
                return 1
              fi

              if ! pkg-config --exists icu-i18n icu-uc; then
                echo "    Fast host service build ICU headers missing; using Nix package build"
                return 1
              fi

              local out="/tmp/go-choir-service-${service}-result"
              local log
              log=$(mktemp)
              local started
              started=$(date +%s)
              echo "    Fast building Host service ${service}: ./cmd/${service}"
              rm -rf "$out"
              mkdir -p "$out/bin" /var/cache/go-choir/go-build /var/cache/go-choir/gomodcache

              (
                export CGO_ENABLED=1
                export GOCACHE=/var/cache/go-choir/go-build
                export GOMODCACHE=/var/cache/go-choir/gomodcache
                export CGO_CFLAGS="$(pkg-config --cflags icu-i18n icu-uc) ${CGO_CFLAGS:-}"
                export CGO_CXXFLAGS="$(pkg-config --cflags icu-i18n icu-uc) ${CGO_CXXFLAGS:-}"
                export CGO_LDFLAGS="$(pkg-config --libs icu-i18n icu-uc) ${CGO_LDFLAGS:-}"
                go build \
                  -trimpath \
                  -ldflags "-s -w -X github.com/yusefmosiah/go-choir/internal/buildinfo.Version=0.1.0 -X github.com/yusefmosiah/go-choir/internal/buildinfo.Commit=${current_commit} -X github.com/yusefmosiah/go-choir/internal/buildinfo.BuiltAt=${deployed_at}" \
                  -o "$out/bin/$service" \
                  "./cmd/$service"
              ) >"$log" 2>&1 || {
                cat "$log"
                rm -f "$log"
                echo "    Fast host service ${service} build failed; using Nix package build"
                return 1
              }

              if command -v ldd >/dev/null 2>&1; then
                if ldd "$out/bin/$service" 2>&1 | tee -a "$log" | grep -q "not found"; then
                  cat "$log"
                  rm -f "$log"
                  echo "    Fast host service ${service} binary has unresolved dynamic libraries; using Nix package build"
                  return 1
                fi
              fi

              if [ "$service" = "sandbox" ] && [ -d skills ]; then
                mkdir -p "$out/share/go-choir/skills"
                (
                  cd skills
                  find . -type f -name SKILL.md | while IFS= read -r skill_file; do
                    install -Dm0644 "$skill_file" "$out/share/go-choir/skills/$skill_file"
                  done
                )
              fi

              rm -f "$log"
              local ended
              ended=$(date +%s)
              echo "    Fast host service ${service} build complete in $((ended - started))s"
            }

            build_host_service_root() {
              local service="$1"
              local out="/tmp/go-choir-service-${service}-result"
              if fast_build_host_service "$service"; then
                return 0
              fi
              rm -rf "$out"
              build_selected_root "Host service ${service}" ".#${service}" "$out"
            }

            selected_build_pids=()
            selected_build_status=0
            if [ "${DEPLOY_FRONTEND}" = "true" ]; then
              build_selected_root "Frontend bundle" ".#frontend" "/tmp/go-choir-frontend-result" &
              selected_build_pids+=("$!")
            else
              echo "    Skipping frontend bundle build"
            fi
            if [ "${service_pointer_deploy}" = "true" ]; then
              IFS=',' read -ra service_roots <<< "${HOST_SERVICES}"
              for service in "${service_roots[@]}"; do
                [ -z "$service" ] && continue
                build_host_service_root "$service" &
                selected_build_pids+=("$!")
              done
              echo "    Skipping host NixOS closure build for service-pointer deploy"
            elif [ "${DEPLOY_HOST}" = "true" ]; then
              build_selected_root "Host NixOS closure" ".#nixosConfigurations.go-choir-b.config.system.build.toplevel" "/tmp/go-choir-nixos-result"
            else
              echo "    Skipping host NixOS closure build"
            fi
            if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ]; then
              build_selected_root "Guest image" ".#guest-image" "/tmp/guest-image-result" &
              selected_build_pids+=("$!")
            else
              echo "    Skipping ordinary guest image build"
            fi
            if [ "${DEPLOY_PLAYWRIGHT_GUEST}" = "true" ]; then
              build_selected_root "Playwright guest image" ".#guest-image-playwright" "/tmp/guest-image-playwright-result" &
              selected_build_pids+=("$!")
            else
              echo "    Skipping Playwright guest image build"
            fi
            for pid in "${selected_build_pids[@]}"; do
              if ! wait "$pid"; then
                selected_build_status=1
              fi
            done
            if [ "$selected_build_status" -ne 0 ]; then
              echo "One or more selected Nix builds failed" >&2
              exit "$selected_build_status"
            fi
            echo "    Selected Nix builds complete"
            note_phase "nix build"

            if [ "${service_pointer_deploy}" = "true" ]; then
              echo "==> Skipping NixOS switch (host service pointer deploy)"
            elif [ "${DEPLOY_HOST}" = "true" ]; then
              echo "==> Activating NixOS config"
              current_system=$(readlink -f /run/current-system)
              next_system=$(readlink -f /tmp/go-choir-nixos-result)
              if [ "$current_system" = "$next_system" ]; then
                echo "    Host closure unchanged; skipping NixOS switch"
              else
                run_switch() {
                  /run/current-system/sw/bin/nix-env -p /nix/var/nix/profiles/system --set "$next_system"
                  NIXOS_NO_CHECK=1 "$next_system/bin/switch-to-configuration" switch
                }
                switch_status=0
                run_switch || switch_status=$?
                if [ "$switch_status" -ne 0 ]; then
                  echo "    Switch failed with status ${switch_status}; checking logind before one retry" >&2
                  dump_deploy_service_diagnostics "nixos switch failed before retry"
                  if ! timeout 10 loginctl list-users >/dev/null 2>&1; then
                    echo "    logind did not answer; restarting systemd-logind before retry" >&2
                    systemctl restart systemd-logind.service || true
                    sleep 3
                  fi
                  retry_status=0
                  run_switch || retry_status=$?
                  if [ "$retry_status" -ne 0 ]; then
                    dump_deploy_service_diagnostics "nixos switch retry failed"
                    exit "$retry_status"
                  fi
                fi
                echo "    Switch complete"
              fi
            else
              echo "==> Skipping NixOS switch (host closure not selected)"
            fi
            note_phase "nixos switch"

            install_frontend_pointer() {
              local src="$1"
              local root="/var/www/go-choir"
              local current="$root/frontend-current"
              local previous="$root/frontend-previous"
              local next="$root/.frontend-next"
              install -d -m 0755 "$root"
              if [ ! -f "$src/index.html" ]; then
                echo "Frontend bundle missing index.html at $src" >&2
                exit 1
              fi
              rm -rf "$next"
              mkdir -p "$next"
              cp -a "$src/." "$next/"
              rm -rf "$previous"
              if [ -e "$current" ]; then
                mv "$current" "$previous"
              fi
              mv "$next" "$current"
              echo "    Frontend directory now contains $(find "$current/assets" -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ') assets"
            }

            echo "==> Installing selected frontend bundle"
            if [ "${DEPLOY_FRONTEND}" = "true" ]; then
              install_frontend_pointer /tmp/go-choir-frontend-result
            elif [ ! -f /var/www/go-choir/frontend-current/index.html ]; then
              echo "Frontend directory is missing and frontend bundle was not selected" >&2
              exit 1
            else
              echo "    Skipping frontend directory update"
            fi
            note_phase "frontend install"

            install_service_pointer() {
              local service="$1"
              local src
              src=$(readlink -f "/tmp/go-choir-service-${service}-result")
              install_service_pointer_from_src "$service" "$src"
            }

            install_service_pointer_from_src() {
              local service="$1"
              local src="$2"
              local root="/var/lib/go-choir/services"
              local current="$root/$service"
              local previous="$root/${service}-previous"
              local next="$root/.${service}-next"
              if [ ! -x "$src/bin/$service" ]; then
                echo "Host service package missing executable $service at $src" >&2
                exit 1
              fi
              install -d -m 0755 "$root"
              rm -rf "$next"
              mkdir -p "$next"
              cp -a "$src/." "$next/"
              rm -rf "$previous"
              if [ -e "$current" ]; then
                mv "$current" "$previous"
              fi
              mv "$next" "$current"
              echo "    Host service pointer updated: $service -> $current"
            }

            if [ "${service_pointer_deploy}" = "true" ]; then
              echo "==> Installing selected host service packages"
              IFS=',' read -ra service_roots <<< "${HOST_SERVICES}"
              for service in "${service_roots[@]}"; do
                [ -z "$service" ] && continue
                install_service_pointer "$service"
              done
              echo "==> Restarting selected host services"
              for service in "${service_roots[@]}"; do
                [ -z "$service" ] && continue
                # sandbox is a VM runtime package, not a host systemd service.
                # The service pointer is installed above; VMs pick it up on
                # refresh/restart. Skip systemd restart for sandbox.
                if [ "$service" = "sandbox" ]; then
                  echo "    Skipped sandbox restart (VM runtime package, not a host service)"
                  continue
                fi
                systemctl restart "go-choir-${service}.service"
                systemctl is-active --quiet "go-choir-${service}.service"
                echo "    Restarted go-choir-${service}.service"
              done
            elif [ "${DEPLOY_HOST}" = "true" ]; then
              echo "==> Synchronizing host service pointers from activated NixOS closure"
              scripts/node-b-sync-service-pointers auth gateway maild corpusd proxy sourcecycled vmctl
            else
              echo "    Skipping host service pointer install"
            fi
            note_phase "host service install"

            echo "==> Ensuring edge config and host services are live"
            if [ "${DEPLOY_HOST}" = "true" ] && [ "${service_pointer_deploy}" != "true" ]; then
              systemctl daemon-reload || true
              systemctl restart \
                go-choir-auth \
                go-choir-maild \
                go-choir-corpusd \
                go-choir-sourcecycled \
                go-choir-gateway \
                go-choir-proxy
              if systemctl is-active --quiet caddy; then
                systemctl reload caddy || systemctl restart caddy
              else
                systemctl start caddy
              fi
            elif [ "${service_pointer_deploy}" = "true" ]; then
              echo "    Host service pointer deploy already restarted selected services"
            elif [ "${DEPLOY_FRONTEND}" = "true" ]; then
              echo "    Host closure not selected; reloading Caddy only for frontend pointer update"
              if systemctl is-active --quiet caddy; then
                systemctl reload caddy || systemctl restart caddy
              else
                systemctl start caddy
              fi
            else
              echo "    Host closure not selected; no host service activation required"
            fi
            note_phase "service activation"

            echo "==> Waiting for services to start"
            if [ "${service_pointer_deploy}" = "true" ]; then
              echo "    Service pointer deploys already wait for selected systemd restarts; health probes below perform readiness retries"
            else
              sleep 5
            fi
            note_phase "service settle"

            install_guest_image() {
              local src="$1"
              local dst="$2"
              install -d -m 0750 "$dst"
              local tmp
              tmp=$(mktemp -d "$dst/.incoming.XXXXXX")
              cleanup_guest_tmp() {
                if [ -n "${tmp:-}" ] && [ -d "$tmp" ]; then
                  rm -rf "$tmp"
                fi
              }
              trap cleanup_guest_tmp EXIT
              install -m 0644 "$src/vmlinux" "$tmp/vmlinux"
              install -m 0644 "$src/rootfs.ext4" "$tmp/rootfs.ext4"
              install -m 0644 "$src/initrd" "$tmp/initrd"
              install -m 0644 "$src/storedisk.erofs" "$tmp/storedisk.erofs"
              install -m 0644 "$src/kernel-params" "$tmp/kernel-params"
              sync
              for artifact in vmlinux rootfs.ext4 initrd storedisk.erofs kernel-params; do
                mv -f "$tmp/$artifact" "$dst/$artifact"
              done
              rmdir "$tmp"
              tmp=
              trap - EXIT
            }

            echo "==> Installing selected guest images (kernel + rootfs + initrd + store disk)"
            if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ]; then
              install_guest_image /tmp/guest-image-result /var/lib/go-choir/guest
              echo "    Ordinary guest image deployed"
            else
              echo "    Skipping ordinary guest image install"
            fi
            if [ "${DEPLOY_PLAYWRIGHT_GUEST}" = "true" ]; then
              install_guest_image /tmp/guest-image-playwright-result /var/lib/go-choir/guest-playwright
              echo "    Playwright guest image deployed"
            else
              echo "    Skipping Playwright guest image install"
            fi
            note_phase "guest image install"

            if [ "${DEPLOY_VMCTL_RESTART}" = "true" ]; then
              echo "==> Restarting vmctl when selected classes require it"
              systemctl restart go-choir-vmctl
              vmctl_ready=false
              for attempt in $(seq 1 30); do
                if curl -fsS --max-time 2 http://127.0.0.1:8083/health >/dev/null 2>&1; then
                  vmctl_ready=true
                  break
                fi
                sleep 1
              done
              if [ "$vmctl_ready" != "true" ]; then
                dump_deploy_service_diagnostics "vmctl did not become healthy after restart"
                exit 1
              fi
            else
              echo "==> Skipping vmctl restart; selected classes do not affect vmctl or guest images"
            fi
            note_phase "vmctl restart"

            sandbox_service_selected=false
            if [ -n "${HOST_SERVICES}" ]; then
              IFS=',' read -ra refresh_services <<< "${HOST_SERVICES}"
              for service in "${refresh_services[@]}"; do
                if [ "$service" = "sandbox" ]; then
                  sandbox_service_selected=true
                fi
              done
            fi
            if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ] || [ "${DEPLOY_ACTIVE_VM_REFRESH}" = "true" ] || [ "$sandbox_service_selected" = "true" ]; then
              if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ]; then
                echo "==> Refreshing active interactive computers onto deployed guest image"
              elif [ "${DEPLOY_ACTIVE_VM_REFRESH}" = "true" ]; then
                echo "==> Refreshing active interactive computers onto deployed VM boot contract"
              else
                echo "==> Hot-refreshing active interactive computers onto deployed sandbox runtime package"
              fi
              ownerships_json=$(curl -fsS --retry 5 --retry-delay 2 --retry-all-errors -H "X-Internal-Caller: true" http://127.0.0.1:8083/internal/vmctl/list)
              mapfile -t active_interactive < <(printf '%s' "$ownerships_json" | jq -r '
                .ownerships[]
                | select(.state == "active")
                | select((.kind == null) or (.kind == "") or (.kind == "interactive"))
                | [.user_id, (.desktop_id // "primary"), .vm_id, .sandbox_url]
                | @tsv
              ')
              if [ "${#active_interactive[@]}" -eq 0 ]; then
                echo "    No active interactive computers need refresh"
              else
                refresh_pids=()
                refresh_status=0
                max_parallel_refresh=4
                if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ] || [ "${DEPLOY_ACTIVE_VM_REFRESH}" = "true" ]; then
                  max_parallel_refresh=1
                fi
                for record in "${active_interactive[@]}"; do
                  IFS=$'\t' read -r refresh_user_id refresh_desktop_id refresh_vm_id refresh_sandbox_url <<< "$record"
                  (
                    if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ] || [ "${DEPLOY_ACTIVE_VM_REFRESH}" = "true" ]; then
                      echo "    Refreshing ${refresh_vm_id} for user ${refresh_user_id} desktop ${refresh_desktop_id}"
                      payload=$(jq -nc --arg user_id "$refresh_user_id" --arg desktop_id "$refresh_desktop_id" '{user_id:$user_id, desktop_id:$desktop_id}')
                      refresh_body="/tmp/go-choir-vm-refresh-${refresh_vm_id}.json"
                      refresh_http_status=$(timeout 300 curl -sS -o "$refresh_body" -w '%{http_code}' --retry 2 --retry-delay 2 --retry-all-errors \
                        -H "X-Internal-Caller: true" \
                        -H "Content-Type: application/json" \
                        -d "$payload" \
                        http://127.0.0.1:8083/internal/vmctl/refresh || printf 'curl_error_%s' "$?")
                      if [[ ! "$refresh_http_status" =~ ^2[0-9][0-9]$ ]]; then
                        echo "    Refresh failed for ${refresh_vm_id} user ${refresh_user_id} desktop ${refresh_desktop_id}: ${refresh_http_status}" >&2
                        if [ -s "$refresh_body" ]; then
                          sed 's/^/      response: /' "$refresh_body" >&2
                        fi
                        exit 1
                      fi
                      echo "    Refreshed ${refresh_vm_id}"
                    else
                      echo "    Hot-refreshing sandbox runtime in ${refresh_vm_id} for user ${refresh_user_id} desktop ${refresh_desktop_id}"
                      hot_status=$(curl -sS -o /tmp/go-choir-hot-refresh-"${refresh_vm_id}".json -w '%{http_code}' --max-time 20 \
                        -H "X-Internal-Caller: true" \
                        -X POST \
                        "${refresh_sandbox_url}/internal/runtime/refresh" || true)
                      if [ "$hot_status" -lt 200 ] || [ "$hot_status" -ge 300 ]; then
                        echo "    Hot-refresh endpoint unavailable for ${refresh_vm_id} (HTTP ${hot_status}); falling back to one full VM refresh"
                        payload=$(jq -nc --arg user_id "$refresh_user_id" --arg desktop_id "$refresh_desktop_id" '{user_id:$user_id, desktop_id:$desktop_id}')
                        timeout 240 curl -fsS --retry 2 --retry-delay 2 --retry-all-errors \
                          -H "X-Internal-Caller: true" \
                          -H "Content-Type: application/json" \
                          -d "$payload" \
                          http://127.0.0.1:8083/internal/vmctl/refresh >/dev/null
                        echo "    Refreshed ${refresh_vm_id}"
                        exit 0
                      fi
                      for attempt in $(seq 1 60); do
                        commit=$(curl -fsS --max-time 2 "${refresh_sandbox_url}/health" 2>/dev/null | jq -r '.build.commit // empty' || true)
                        if [ "$commit" = "$current_commit" ]; then
                          echo "    Hot-refreshed ${refresh_vm_id}"
                          exit 0
                        fi
                        sleep 1
                      done
                      echo "Timed out waiting for ${refresh_vm_id} to serve sandbox runtime ${current_commit}" >&2
                      exit 1
                    fi
                  ) &
                  refresh_pids+=("$!")
                  if [ "${#refresh_pids[@]}" -ge "$max_parallel_refresh" ]; then
                    for refresh_pid in "${refresh_pids[@]}"; do
                      wait "$refresh_pid" || refresh_status=$?
                    done
                    refresh_pids=()
                  fi
                done
                for refresh_pid in "${refresh_pids[@]}"; do
                  wait "$refresh_pid" || refresh_status=$?
                done
                if [ "$refresh_status" -ne 0 ]; then
                  if [ "${DEPLOY_ORDINARY_GUEST}" = "true" ] || [ "${DEPLOY_ACTIVE_VM_REFRESH}" = "true" ]; then
                    echo "One or more active computer refreshes failed; continuing because Mission C still owns the autoputer boot contract and host deploy health remains authoritative" >&2
                    dump_deploy_service_diagnostics "active computer refresh failed"
                  else
                    echo "One or more sandbox runtime hot-refreshes failed; continuing because host deploy and health checks remain authoritative" >&2
                  fi
                fi
              fi
            else
              echo "==> Skipping active computer refresh; ordinary guest image and sandbox runtime package unchanged"
            fi
            note_phase "active computer refresh"

            echo "==> Smoke test: health endpoints"
            for port in 8081 8082 8083 8084 8086 8087; do
              curl -fsS --retry 5 --retry-delay 2 --retry-all-errors http://127.0.0.1:$port/health
              echo "    Port $port: OK"
            done
            proxy_health=$(curl -fsS --retry 5 --retry-delay 2 --retry-all-errors http://127.0.0.1:8082/health)
            if ! echo "$proxy_health" | grep -q '"service":"proxy"'; then
              echo "Proxy health probe hit the wrong service (expected proxy on :8082): $proxy_health" >&2
              dump_deploy_service_diagnostics "proxy health probe wrong service"
              exit 1
            fi
            # Proxy health must report status="ok". With vmctl routing (the
            # steady state after PR 5), upstream="vmctl" and vmctl_status must
            # also be "ok". With static routing, upstream="ok".
            if ! echo "$proxy_health" | grep -q '"status":"ok"'; then
              echo "Proxy status is not ok: $proxy_health" >&2
              dump_deploy_service_diagnostics "proxy status unhealthy"
              exit 1
            fi
            if echo "$proxy_health" | grep -q '"vmctl_routing":"enabled"'; then
              if ! echo "$proxy_health" | grep -q '"vmctl_status":"ok"'; then
                echo "Proxy vmctl_status is not ok: $proxy_health" >&2
                dump_deploy_service_diagnostics "proxy vmctl unhealthy"
                exit 1
              fi
            fi
            echo "    Proxy upstream: OK"
            note_phase "health checks"

            echo "==> Smoke test: public frontend asset graph"
            served_asset=$(curl -fsS --retry 5 --retry-delay 2 --retry-all-errors --resolve choir.news:443:147.135.70.196 https://choir.news/ |
              sed -n "s/.*src=\"\\/assets\\/\\([^\"]*\\.js\\)\".*/\\1/p" |
              head -n 1)
            if [ -z "$served_asset" ]; then
              echo "Could not find served frontend JS asset in public index" >&2
              exit 1
            fi
            if [ ! -f "/var/www/go-choir/frontend-current/assets/$served_asset" ] && [ ! -f "/var/www/go-choir/frontend-previous/assets/$served_asset" ]; then
              echo "Served asset $served_asset is not in frontend-current or frontend-previous" >&2
              exit 1
            fi
            if ! curl -fsSI --retry 5 --retry-delay 2 --retry-all-errors --resolve choir.news:443:147.135.70.196 "https://choir.news/assets/$served_asset" >/dev/null; then
              echo "Served asset URL /assets/$served_asset did not resolve through Caddy" >&2
              exit 1
            fi
            echo "    Public frontend asset /assets/$served_asset resolves through current/previous asset roots"
            note_phase "frontend asset graph"

            echo "==> Staging deploy complete"
          REMOTE_DEPLOY

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
