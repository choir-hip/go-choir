name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-vet-build:
    name: Go Vet + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/...

  go-test:
    name: Go Test (non-runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test non-runtime packages
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '^github.com/yusefmosiah/go-choir/internal/runtime$')
          if (( ${#packages[@]} > 0 )); then
            scripts/go-test-with-timing -count=1 "${packages[@]}"
          fi

  go-test-runtime:
    name: Go Test (internal/runtime shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test internal/runtime shard
        shell: bash
        env:
          TOTAL_SHARDS: 4
          SHARD_INDEX: ${{ matrix.shard }}
        run: scripts/go-test-runtime-shards

  go-test-integration:
    name: Go Test (integration-tagged smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test integration-tagged smoke
        shell: bash
        run: scripts/go-test-integration

  check:
    name: Go Vet + Test + Build
    runs-on: ubuntu-latest
    needs: [go-vet-build, go-test, go-test-runtime, go-test-integration]
    if: always()
    steps:
      - name: Confirm Go gates passed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.go-vet-build.result }}" != "success" ]]; then
            echo "go-vet-build result: ${{ needs.go-vet-build.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.go-test.result }}" != "success" ]]; then
            echo "go-test result: ${{ needs.go-test.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.go-test-runtime.result }}" != "success" ]]; then
            echo "go-test-runtime result: ${{ needs.go-test-runtime.result }}" >&2
            exit 1
          fi
          if [[ "${{ needs.go-test-integration.result }}" != "success" ]]; then
            echo "go-test-integration result: ${{ needs.go-test-integration.result }}" >&2
            exit 1
          fi
          echo "Go vet, test, and build gates passed"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

  deploy-impact:
    name: Detect Staging Deploy Impact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect deployed artifact changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -n "$before" && ! "$before" =~ ^0+$ ]]; then
            git fetch --no-tags --depth=1 origin "$before" || true
          fi

          if [[ -z "$before" || "$before" =~ ^0+$ ]] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$after")
          else
            mapfile -t changed < <(git diff --name-only "$before" "$after")
          fi

          deploy_needed=false
          for path in "${changed[@]}"; do
            case "$path" in
              docs/*|.github/*|frontend/tests/*|frontend/playwright-report/*|frontend/test-results/*)
                continue
                ;;
            esac
            if [[ "$path" != */* && "$path" == *.md ]]; then
              continue
            fi
            deploy_needed=true
            break
          done

          {
            echo "deploy_needed=${deploy_needed}"
            echo "changed_paths<<EOF"
            printf '%s\n' "${changed[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "$deploy_needed" == "true" ]]; then
            echo "Staging deploy required: at least one deployed artifact path changed."
          else
            echo "Skipping staging deploy: only docs, workflow, or Playwright test artifacts changed."
          fi

  deploy-staging:
    name: Deploy to Staging (Node B)
    runs-on: ubuntu-latest
    needs: [check, build-frontend, deploy-impact]
    if: github.ref == 'refs/heads/main' && needs.deploy-impact.outputs.deploy_needed == 'true'
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Set up Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host go-choir-node-b
            HostName ${{ secrets.OVH_NODE_B_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 6
          EOF

      - name: Prebuild and copy Nix deploy closures
        shell: bash
        run: |
          set -euo pipefail
          started_at=$(date +%s)
          echo "==> Building deploy closures on GitHub runner"
          deploy_paths_file=$(mktemp)
          if nix build -L --print-out-paths --no-link \
            .#nixosConfigurations.go-choir-b.config.system.build.toplevel \
            .#guest-image \
            .#guest-image-playwright >"$deploy_paths_file"; then
            :
          else
            prebuild_status=$?
            rm -f "$deploy_paths_file"
            echo "::warning::GitHub runner prebuild failed with status ${prebuild_status}; Node B will build during deploy."
            exit 0
          fi
          mapfile -t deploy_paths < "$deploy_paths_file"
          rm -f "$deploy_paths_file"

          build_done_at=$(date +%s)
          echo "    Built ${#deploy_paths[@]} deploy roots in $((build_done_at - started_at))s"
          printf "    %s\n" "${deploy_paths[@]}"

          echo "==> Copying deploy closures to Node B Nix store"
          copy_status=0
          nix copy --to ssh-ng://go-choir-node-b "${deploy_paths[@]}" || copy_status=$?
          copied_at=$(date +%s)
          if [ "$copy_status" -ne 0 ]; then
            echo "::warning::Nix closure copy failed with status ${copy_status}; Node B will build during deploy."
            exit 0
          fi
          echo "    Copied deploy closures in $((copied_at - build_done_at))s"

      - name: Deploy to staging
        run: |
          ssh go-choir-node-b '
            set -euo pipefail
            export PATH="/run/current-system/sw/bin:/run/wrappers/bin:$PATH"
            deploy_started_at=$(date +%s)
            phase_started_at=$deploy_started_at
            note_phase() {
              local phase="$1"
              local now
              now=$(date +%s)
              echo "    Phase ${phase}: $((now - phase_started_at))s (total $((now - deploy_started_at))s)"
              phase_started_at=$now
            }

            if [ ! -d /opt/go-choir/.git ]; then
              echo "==> Cloning go-choir repository"
              git clone https://github.com/yusefmosiah/go-choir.git /opt/go-choir
            fi

            cd /opt/go-choir
            echo "==> Pulling latest code"
            git fetch origin
            git reset --hard origin/main
            git clean -ffdX
            current_commit=$(git rev-parse HEAD)
            deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            install -d -m 0750 /var/lib/go-choir
            printf "CHOIR_DEPLOYED_AT=%s\nCHOIR_DEPLOYED_COMMIT=%s\n" "$deployed_at" "$current_commit" > /var/lib/go-choir/deploy.env
            chmod 0644 /var/lib/go-choir/deploy.env
            note_phase "checkout"

            systemctl reset-failed nixos-rebuild-switch-to-configuration.service 2>/dev/null || true

            echo "==> Building NixOS closure and guest images"
            host_build_log=$(mktemp)
            guest_build_log=$(mktemp)
            playwright_guest_build_log=$(mktemp)
            /run/current-system/sw/bin/nix build .#nixosConfigurations.go-choir-b.config.system.build.toplevel -o /tmp/go-choir-nixos-result >"$host_build_log" 2>&1 &
            host_build_pid=$!
            /run/current-system/sw/bin/nix build .#guest-image -o /tmp/guest-image-result >"$guest_build_log" 2>&1 &
            guest_build_pid=$!
            /run/current-system/sw/bin/nix build .#guest-image-playwright -o /tmp/guest-image-playwright-result >"$playwright_guest_build_log" 2>&1 &
            playwright_guest_build_pid=$!

            host_status=0
            wait "$host_build_pid" || host_status=$?
            echo "==> Host NixOS closure build log"
            cat "$host_build_log"

            guest_status=0
            wait "$guest_build_pid" || guest_status=$?
            echo "==> Guest image build log"
            cat "$guest_build_log"

            playwright_guest_status=0
            wait "$playwright_guest_build_pid" || playwright_guest_status=$?
            echo "==> Playwright guest image build log"
            cat "$playwright_guest_build_log"

            rm -f "$host_build_log" "$guest_build_log" "$playwright_guest_build_log"
            if [ "$host_status" -ne 0 ] || [ "$guest_status" -ne 0 ] || [ "$playwright_guest_status" -ne 0 ]; then
              echo "Nix build failed: host=${host_status} guest=${guest_status} playwright_guest=${playwright_guest_status}" >&2
              exit 1
            fi
            echo "    Nix builds complete"
            note_phase "nix build"

            echo "==> Activating NixOS config"
            current_system=$(readlink -f /run/current-system)
            next_system=$(readlink -f /tmp/go-choir-nixos-result)
            if [ "$current_system" = "$next_system" ]; then
              echo "    Host closure unchanged; skipping NixOS switch"
            else
              run_switch() {
                /run/current-system/sw/bin/nix-env -p /nix/var/nix/profiles/system --set "$next_system"
                NIXOS_NO_CHECK=1 "$next_system/bin/switch-to-configuration" switch
              }
              switch_status=0
              run_switch || switch_status=$?
              if [ "$switch_status" -ne 0 ]; then
                echo "    Switch failed with status ${switch_status}; checking logind before one retry" >&2
                if ! timeout 10 loginctl list-users >/dev/null 2>&1; then
                  echo "    logind did not answer; restarting systemd-logind before retry" >&2
                  systemctl restart systemd-logind.service || true
                  sleep 3
                fi
                run_switch
              fi
              echo "    Switch complete"
            fi
            note_phase "nixos switch"

            echo "==> Ensuring edge config and host services are live"
            systemctl daemon-reload || true
            systemctl start \
              go-choir-auth \
              go-choir-platformd \
              go-choir-sandbox \
              go-choir-gateway \
              go-choir-proxy \
              caddy
            if systemctl is-active --quiet caddy; then
              systemctl reload caddy || systemctl restart caddy
            else
              systemctl start caddy
            fi
            note_phase "service activation"

            echo "==> Waiting for services to start"
            sleep 5
            note_phase "service settle"

            install_guest_image() {
              local src="$1"
              local dst="$2"
              install -d -m 0750 "$dst"
              local tmp
              tmp=$(mktemp -d "$dst/.incoming.XXXXXX")
              cleanup_guest_tmp() {
                if [ -n "${tmp:-}" ] && [ -d "$tmp" ]; then
                  rm -rf "$tmp"
                fi
              }
              trap cleanup_guest_tmp EXIT
              install -m 0644 "$src/vmlinux" "$tmp/vmlinux"
              install -m 0644 "$src/rootfs.ext4" "$tmp/rootfs.ext4"
              install -m 0644 "$src/initrd" "$tmp/initrd"
              install -m 0644 "$src/storedisk.erofs" "$tmp/storedisk.erofs"
              install -m 0644 "$src/kernel-params" "$tmp/kernel-params"
              sync
              for artifact in vmlinux rootfs.ext4 initrd storedisk.erofs kernel-params; do
                mv -f "$tmp/$artifact" "$dst/$artifact"
              done
              rmdir "$tmp"
              tmp=
              trap - EXIT
            }

            echo "==> Installing guest images (kernel + rootfs + initrd + store disk)"
            install_guest_image /tmp/guest-image-result /var/lib/go-choir/guest
            install_guest_image /tmp/guest-image-playwright-result /var/lib/go-choir/guest-playwright
            echo "    Guest images deployed"
            note_phase "guest image install"

            echo "==> Restarting vmctl to pick up new guest images"
            systemctl restart go-choir-vmctl
            sleep 3
            note_phase "vmctl restart"

            echo "==> Smoke test: health endpoints"
            for port in 8081 8082 8083 8084 8086; do
              curl -fsS --retry 5 --retry-delay 2 --retry-all-errors http://127.0.0.1:$port/health
              echo "    Port $port: OK"
            done
            note_phase "health checks"

            echo "==> Smoke test: public frontend asset graph"
            configured_frontend_root=$(sed -n "s|^[[:space:]]*root \\* \\(/nix/store/[^[:space:]]*go-choir-frontend[^[:space:]]*\\).*|\\1|p" /etc/caddy/caddy_config | head -n 1)
            if [ -z "$configured_frontend_root" ]; then
              echo "Could not find configured frontend root in Caddy config" >&2
              exit 1
            fi
            served_asset=$(curl -fsS --retry 5 --retry-delay 2 --retry-all-errors https://draft.choir-ip.com/ |
              sed -n "s/.*src=\"\\/assets\\/\\([^\"]*\\.js\\)\".*/\\1/p" |
              head -n 1)
            if [ -z "$served_asset" ]; then
              echo "Could not find served frontend JS asset in public index" >&2
              exit 1
            fi
            if [ ! -f "$configured_frontend_root/assets/$served_asset" ]; then
              echo "Served asset $served_asset is not in configured frontend root $configured_frontend_root" >&2
              exit 1
            fi
            echo "    Public frontend asset $served_asset belongs to $configured_frontend_root"
            note_phase "frontend asset graph"

            echo "==> Staging deploy complete"
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
