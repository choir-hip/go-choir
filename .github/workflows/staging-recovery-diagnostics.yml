name: One-time staging recovery diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect retained-computer recovery
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host go-choir-node-b
            HostName ${{ secrets.OVH_NODE_B_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 6
          EOF

      - name: Capture bounded recovery evidence
        run: |
          ssh go-choir-node-b 'bash -s' <<'REMOTE_DIAGNOSTICS'
          set -euo pipefail
          echo '==> vmctl service state'
          systemctl show go-choir-vmctl.service \
            --property=ActiveState,SubState,ExecMainStartTimestamp,ExecMainStatus,NRestarts
          echo '==> retained computer ownership'
          curl -fsS -H 'X-Internal-Caller: true' http://127.0.0.1:8083/internal/vmctl/list |
            jq '{ownerships: [.ownerships[] | select((.computer_id // .immutable_identity.computer_id) == "computer-03335285269bdba4f94377e56879f9e6") | {computer_id,vm_id,desktop_id,state,epoch,sandbox_url,immutable_identity}]}'
          echo '==> persisted retained computer ownership'
          jq '{saved_at, ownerships: [.ownerships[] | select((.computer_id // .immutable_identity.computer_id) == "computer-03335285269bdba4f94377e56879f9e6") | {computer_id,vm_id,desktop_id,state,epoch,sandbox_url,immutable_identity}]}' \
            /var/lib/go-choir/vm-state/ownerships.json
          echo '==> exact failed-refresh journal window'
          journalctl -u go-choir-vmctl.service \
            --since '2026-07-23 14:18:30 UTC' --until '2026-07-23 14:21:00 UTC' \
            --no-pager --output=short-iso --lines=1200 |
            sed -E \
              -e 's/(Bearer )[A-Za-z0-9._-]+/\1[REDACTED]/g' \
              -e 's/((token|secret|private_key|api_key)[=:])[A-Za-z0-9._\/-]+/\1[REDACTED]/Ig'
          echo '==> failed-refresh artifact metadata'
          find /var/lib/go-choir/vm-state -maxdepth 2 -type f \
            \( -path '*vm-refreshing*' -o -newermt '2026-07-23 14:18:30 UTC' \) \
            ! -newermt '2026-07-23 14:21:00 UTC' \
            -printf '%TY-%Tm-%TdT%TH:%TM:%TSZ %s %p\n' | sort | head -200
          REMOTE_DIAGNOSTICS

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
