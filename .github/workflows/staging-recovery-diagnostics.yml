name: One-time staging recovery diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect first-boot guest signer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host go-choir-node-b
            HostName ${{ secrets.OVH_NODE_B_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 6
          EOF

      - name: Capture bounded signer startup evidence
        run: |
          ssh go-choir-node-b 'bash -s' <<'REMOTE_DIAGNOSTICS'
          set -euo pipefail
          echo '==> vmctl service state'
          systemctl show go-choir-vmctl.service \
            --property=ActiveState,SubState,ExecMainStartTimestamp,ExecMainStatus,NRestarts
          echo '==> recent computer ownerships'
          curl -fsS -H 'X-Internal-Caller: true' http://127.0.0.1:8083/internal/vmctl/list |
            jq '{ownerships: [.ownerships[] | select((.epoch // 0) >= 8197) | {computer_id,vm_id,desktop_id,state,epoch,sandbox_url,immutable_identity}]}'
          echo '==> signer-gated deployment journal'
          journalctl -u go-choir-vmctl.service \
            --since '2026-07-24 00:05:00 UTC' \
            --no-pager --output=short-iso --lines=3000 |
            sed -E \
              -e 's/(Bearer )[A-Za-z0-9._-]+/\1[REDACTED]/g' \
              -e 's/((token|secret|private_key|api_key)[=:])[A-Za-z0-9._\/-]+/\1[REDACTED]/Ig' |
            grep -E 'choir-receipt-signer|guest signer|guest-signer|startup|vm-|health|ready|failed|error' |
            tail -1200
          echo '==> unfiltered first-boot dependency window'
          journalctl -u go-choir-vmctl.service \
            --since '2026-07-24 00:06:35 UTC' \
            --until '2026-07-24 00:07:05 UTC' \
            --no-pager --output=short-iso |
            sed -E \
              -e 's/(Bearer )[A-Za-z0-9._-]+/\1[REDACTED]/g' \
              -e 's/((token|secret|private_key|api_key)[=:])[A-Za-z0-9._\/-]+/\1[REDACTED]/Ig' |
            tail -1500
          echo '==> recent VM artifact metadata'
          find /var/lib/go-choir/vm-state -maxdepth 2 -type f \
            -newermt '2026-07-24 00:05:00 UTC' \
            -printf '%TY-%Tm-%TdT%TH:%TM:%TSZ %s %p\n' | sort | tail -200
          echo '==> failed first-boot signer inode metadata'
          failed_image=/var/lib/go-choir/vm-state/vm-57d6bb29efbea2ebd64c5384d6be2c58/data.img
          for path in /choir-signers /choir-signers/guest-core /choir-signers/guest-core/key.ed25519 /choir-signers/guest-core/receipts; do
            echo "-- $path"
            debugfs -R "stat $path" "$failed_image" 2>&1 || true
          done
          REMOTE_DIAGNOSTICS

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
