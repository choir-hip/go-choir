name: Race Detector

on:
  pull_request:
    paths:
      - .github/workflows/race.yml
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * 1'

concurrency:
  group: race-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-test-runtime-race:
    name: Go Test (agentcore/textureowner race shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-build-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            go-build-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Go test agentcore/textureowner shard with -race
        shell: bash
        env:
          TOTAL_SHARDS: 4
          SHARD_INDEX: ${{ matrix.shard }}
        run: scripts/go-test-runtime-shards -race

  go-test-race:
    name: Go Test (non-runtime race shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-build-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            go-build-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Go test non-runtime shard with -race
        shell: bash
        env:
          TOTAL_SHARDS: 3
          SHARD_INDEX: ${{ matrix.shard }}
        run: scripts/go-test-non-runtime-shards -race
