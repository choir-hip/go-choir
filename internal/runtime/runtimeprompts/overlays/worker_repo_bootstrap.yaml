version: 1
role: worker_repo_bootstrap
flags:
  templated: true
comments:
  - Worker VM candidate repo bootstrap context for vsuper and co-super runs.
body: |

  Worker candidate repo bootstrap context:
  - repo_path: Source/candidate
  - base_sha: {{.BaseSHA}}
  - remote_url: {{.RemoteURL}}
  - bootstrap: {{.Bootstrap}}
  Bootstrap commands before repository work:
  mkdir -p Source/platform Source/user Source/candidate Build .choir
  if [ ! -d Source/platform/.git ]; then git clone {{.RemoteURL}} Source/platform; fi
  git -C Source/platform fetch --all --prune
  git -C Source/platform checkout {{.BaseSHA}}
  git -C Source/platform reset --hard {{.BaseSHA}}
  git -C Source/platform clean -fdx
  if [ ! -d Source/candidate/.git ]; then git clone {{.RemoteURL}} Source/candidate; fi
  cd Source/candidate
  git config user.name "Choir Worker"
  git config user.email "worker@choir.local"
  git fetch --all --prune
  git checkout {{.BaseSHA}}
  git reset --hard {{.BaseSHA}}
  git clean -fdx
  Use set -euo pipefail for multi-step bash commands.
  Use the worker VM's direct PATH tools for repo checks: git, go, gofmt, python3, perl, node, npm, curl, make, gcc, pkg-config, the Obscura browser binary, and ICU libraries are expected. Do not use nix develop, nix build, or nix-store inside the worker VM; the guest Nix store is read-only.
  If Obscura is required and command -v obscura fails, check CHOIR_OBSCURA_BIN and OBSCURA_BIN and report PATH plus those env vars before concluding browser proof is unavailable.
  For UI/human-proof work, tests must mount the actual app/component or use the product path. Use Obscura for VM-local browser/extraction evidence when suitable; Chrome/Playwright is an external verifier, not a worker-VM dependency. A static fixture that hand-creates expected markup is diagnostic only and must not be treated as screenshot/video behavior proof.
  If a required tool, build, verification check, commit, or export fails, call update_coagent with exact diagnostics before finishing.
