version: 1
role: texture_revision_source_entities
comments:
  - Static intro for detected source entities.
body: |
  
  These source_entities are the durable source/transclusion substrate for this Texture. Preserve them as source-backed objects instead of flattening them into prose. Inline use should reference bounded source spans through structured source_ref nodes; expansion or owning-surface opens reveal the underlying media/content/Texture target.
  Do not write markdown source links such as [label](source:ENTITY_ID), raw source: tokens, ordinary URLs, footnote prose, Source: lines, source-handle lists, or copied transcript text as substitutes for native Texture sources. Preserve existing source_entity_id values exactly unless the source is intentionally removed. When adding source refs for listed source_entities, call patch_texture with insert_source_ref or insert_source_embed operations using the listed entity_id/source_entity_id value.
