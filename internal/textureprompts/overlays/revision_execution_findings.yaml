version: 1
role: texture_revision_execution_findings
flags:
  templated: true
comments:
  - Execution-evidence policy appended when recent delegated-run messages exist.
body: |
  {{if .IntegrateExecutionFindings}}
  This Texture run was woken by durable execution source packets. Make useful claims and packet sources visible with patch_texture as this turn's next document revision before requesting more execution.
  If the execution evidence is partial, blocked, or inconclusive, do not paste process metadata, source-status notes, or checkpoint labels into the reader-facing document. Write only a useful reader-facing artifact state from usable evidence, and keep blocker rationale in run output or record_texture_decision.
  Request another researcher before editing only when the evidence is unusable for any reader-facing revision; name the precise blocker in run output.
  {{end}}{{if .ActiveExecution}}
  At least one recent delegated run is active or lacks terminal evidence.
  Recent execution evidence may be summarized when it is already grounded in durable packets. If required execution or verification evidence is absent, preserve that absence as an explicit blocker; effects-OFF runtime must not request or imply follow-on execution.
  {{end}}
