  # (Append → DOLT_COMMIT, Cursor → remote tracking branch, VerifyChain → Dolt
  # hash verification) maps directly to Dolt capabilities. The custom hash chain
  # (computeHash in journal.go) is Dolt's content-addressed commit hash. The
  # cursor is a remote tracking branch. The parent-event chaining is Dolt's
  # parent commit. PR #24's owner-scoped cursors, conflict participant IDs,
