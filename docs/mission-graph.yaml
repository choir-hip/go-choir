- id: edition-texture-schema-v0
  title: 'Mission: Edition Texture Schema v0'
  path: docs/mission-spine-object-graph-ubiquitous-v0.md
  ledger: ''
  status: planned
  kind: spine
  # Model what an edition texture IS: its structure, its transclusion links to
  # articles, its lifecycle (per-cycle creation, accumulation, archival). The
  # vision says editions are textures that transclude articles. Currently the
  # edition is a single Wire.texture document with regex-parsed links. This
  # mission defines the edition as an object graph node (choir.texture.edition)
  # with transcludes edges to article nodes. Per-cycle edition creation: each
  # cycle creates a new edition node with edges to that cycle's articles,
  # replacing the string-concatenation append in autonomousPublishWireArticleTo-
  # Edition. Editions accumulate as immutable blocks in the editorial chain
  # (Dolt time-travel provides as-of queries for free).
