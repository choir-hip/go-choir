  ledger: ''
  status: planned
  kind: spine
  # Model the autopaper: a texture that transcludes algorithm + styleguide +
  # schedule + renderer + context textures. The autopaper is the configuration
  # for a user's automatic computer — it says what the computer does, how it
  # does it, when it does it, how it renders, and what context it carries.
  # Currently the agent pipeline gets its configuration from hardcoded prompts
  # and runtime config. The vision says it should read the autopaper texture,
  # follow its transclusions, and pull algorithm/styleguide/context textures
  # into the generation context. This mission defines the autopaper schema and
  # the sub-texture type conventions (algorithm, styleguide, schedule, renderer).
