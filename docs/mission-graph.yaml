  # regex-parsed Wire.texture. The web capture path (universalWireWebCapture-
  # Stories) already does graph traversal — ListObjects + ListEdges. The
  # article path (universalWireEditionTextureStories) reads one document,
  # regex-parses texture:doc-id refs from its content, and fetches each doc
  # individually (N+1 queries). The graph path is: list recent edition objects
  # → list transcludes edges → batch-fetch article objects → project to
  # WireStory. Same shape as the web capture path. Proof: the wire API returns
  # the same stories through graph traversal that it returned through regex
  # parsing.
