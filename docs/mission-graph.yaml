# === Agent API Surface Spine (2026-06-29) ===
# The API key scopes from PR #20 (read:texture, write:texture, read:base,
# write:base, read:runtime, write:runtime) are the right scopes. But the
# endpoints they gate are shaped for the frontend and sync engine, not for
# agents. This spine builds a graph-native API surface and an MCP server.
- id: agent-api-graph-native-v0
  title: 'Mission: Agent API Graph-Native v0'
  path: docs/mission-spine-agent-api-surface-v0.md
  ledger: ''
  status: planned
  kind: spine
  # Build graph-native /api/v1/ endpoint surface: objects, edges, search, runs,
  # work-items, files. Unified API for all consumers (frontend, desktop, web
  # desktop, external agents, internal services). The frontend stops calling
  # /api/universal-wire/stories and starts calling /api/v1/objects?kind=
  # texture.edition → /api/v1/objects/:id/edges?kind=transcludes → batch fetch.
  # Same API, different consumer. Scopes map: read:texture → GET objects/edges/
  # search, write:texture → POST/PATCH objects/edges, read:base → GET files,
  # write:base → PUT files, read:runtime → GET runs/work-items, write:runtime
  # → POST runs/cancel. Batch-friendly, cursor-paginated, structured errors,
  # idempotency keys, time-travel (as_of).
  depends_on:
  - texture-kinds-objectgraph-v0
  - qdrant-index-on-publish-v0
  - wire-api-graph-traversal-v0
  enables:
  - agent-api-mcp-server-v0
  - beads-kanban-ui-v0
  sources:
  - internal/runtime/api.go
  - internal/proxy/handlers.go
  - internal/auth/handlers.go
  - internal/base/api/handlers.go
