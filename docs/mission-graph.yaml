- id: naming-rectification-v0
  title: 'Mission: Naming Rectification v0'
  path: docs/naming-rectification-2026-06-27.md
  ledger: ''
  status: planned
  kind: side
  # Comprehensive rename pass: sandbox → autoputer, platformd → corpusd,
  # sourcegraph → fold into cycle, channel → mailbox, retired vocabulary
  # cleanup. The plan is in docs/naming-rectification-2026-06-27.md.
  #
  # Key renames:
  #   1. sandbox → autoputer (service/binary name, product ontology)
  #      cmd/sandbox/ → cmd/autoputer/, internal/sandbox/ → internal/autoputer/
  #      Sandbox* types → Autoputer* types, sandbox* functions → autoputer*
  #      The product object is a "computer" (doctrine term); "autoputer" is
  #      the service/binary name (like sourcecycled, corpusd).
  #   2. platformd → corpusd (service/binary name)
  #      cmd/platformd/ → cmd/corpusd/, internal/platform/ → internal/corpus/
  #      Platform* → Corpus*, platformd → corpusd
  #   3. internal/sourcegraph/ → fold into internal/cycle/ (delete package)
  #   4. internal/store/texture_source_graph.go → texture_source_store.go
  #   5. channel → mailbox (actor protocol)
  #   6. Retired vocabulary cleanup (vtext, continuation, lease, etc.)
  #
  # Method: ast-grep for Go code, sed/manual for docs and configs.
  # One commit per rename, with before/after line counts.
  # Verify: go build ./..., go test -race ./..., nix develop -c go vet.
  depends_on:
  - host-sandbox-deletion-v0
  enables:
  - host-sandbox-deletion-v0
